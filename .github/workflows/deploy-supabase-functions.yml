# Deploy Edge Functions on push to main. Bundling via Supabase API first (--use-api),
# then Docker fallback if needed. No separate `docker version` gate (that can fail and stop the job).

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'bfhdtmxmlcfyxjgracbz' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # CLI does not always pick up the env var alone in CI; login stores credentials.
      - name: Supabase login (validate token)
        shell: bash
        run: |
          set -eo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Add secret SUPABASE_ACCESS_TOKEN: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          TOKEN="$(printf '%s' "${SUPABASE_ACCESS_TOKEN}" | tr -d '\r\n')"
          supabase login --token "${TOKEN}"
          supabase projects list -o json > /dev/null
          echo "Supabase auth OK"

      - name: Deploy Edge Functions
        shell: bash
        run: |
          set -eo pipefail

          REF="${SUPABASE_PROJECT_REF:-}"
          if [ -z "${REF}" ]; then
            REF="bfhdtmxmlcfyxjgracbz"
          fi
          echo "Project ref: ${REF}"
          supabase --version

          deploy_one() {
            local name="$1"
            echo "::group::Deploy ${name}"
            set +e
            supabase functions deploy "${name}" --use-api --project-ref "${REF}" 2>&1
            local code=$?
            set -e
            if [ "${code}" -ne 0 ]; then
              echo "::warning::--use-api failed (${code}) for ${name}; retrying with Docker bundling..."
              supabase functions deploy "${name}" --project-ref "${REF}"
            fi
            echo "::endgroup::"
          }

          while IFS= read -r dir; do
            [ -n "${dir}" ] || continue
            name="$(basename "${dir}")"
            [ "${name}" != "_shared" ] || continue
            if [ ! -f "${dir}/index.ts" ] && [ ! -f "${dir}/index.js" ]; then
              echo "Skipping ${name} (no entrypoint)"
              continue
            fi
            deploy_one "${name}"
          done < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d | sort)
