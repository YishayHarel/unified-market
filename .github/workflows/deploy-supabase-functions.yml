# Deploy every Edge Function on push to main (paths below).
# Uses Docker on the runner (available on ubuntu-latest); falls back to --use-api per function if needed.

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Must match supabase/config.toml project_id when secret is unset or empty
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'bfhdtmxmlcfyxjgracbz' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check Docker (bundling default)
        run: docker version

      - name: Deploy Edge Functions
        shell: bash
        run: |
          set -eo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Create a Personal Access Token at https://supabase.com/dashboard/account/tokens"
            echo "::error::Add it as repository secret SUPABASE_ACCESS_TOKEN (Settings → Secrets and variables → Actions)."
            exit 1
          fi

          REF="${SUPABASE_PROJECT_REF:-}"
          if [ -z "${REF}" ]; then
            REF="bfhdtmxmlcfyxjgracbz"
          fi

          echo "Using project ref: ${REF}"
          supabase --version

          deploy_one() {
            local name="$1"
            echo "::group::Deploy ${name}"
            set +e
            supabase functions deploy "${name}" --project-ref "${REF}" 2>&1
            local code=$?
            set -e
            if [ "${code}" -ne 0 ]; then
              echo "Docker bundling failed (${code}); retrying with --use-api for ${name}..."
              supabase functions deploy "${name}" --use-api --project-ref "${REF}"
            fi
            echo "::endgroup::"
          }

          # Portable listing (no shopt/glob pitfalls on CI)
          while IFS= read -r dir; do
            [ -n "${dir}" ] || continue
            name="$(basename "${dir}")"
            [ "${name}" != "_shared" ] || continue
            if [ ! -f "${dir}/index.ts" ] && [ ! -f "${dir}/index.js" ]; then
              echo "Skipping ${name} (no entrypoint)"
              continue
            fi
            deploy_one "${name}"
          done < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d | sort)
