# Auto-deploy all Supabase Edge Functions when you push to main.
# Frontend: Vercel auto-deploys when the repo is connected in Vercel Dashboard.
# Backend: This workflow deploys each function with --use-api (no Docker on GitHub runners).

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:  # "Run workflow" button in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'bfhdtmxmlcfyxjgracbz' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # --use-api: bundle on Supabase (no Docker on the runner).
      # Deploy each real function only: skip _shared (helpers, not an entrypoint).
      # Bulk `supabase functions deploy` can try to deploy _shared and exit immediately.
      - name: Deploy all Edge Functions
        working-directory: .
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Add the repository secret SUPABASE_ACCESS_TOKEN (Supabase Dashboard → Account → Access Tokens)."
            exit 1
          fi
          REF="${SUPABASE_PROJECT_REF:-bfhdtmxmlcfyxjgracbz}"
          if [ -z "${REF}" ]; then
            REF="bfhdtmxmlcfyxjgracbz"
          fi
          echo "Supabase CLI: $(supabase --version)"
          echo "Deploying to project ref: ${REF}"

          shopt -s nullglob
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            if [ "$name" = "_shared" ]; then
              echo "Skipping $name (shared helpers)"
              continue
            fi
            if [ ! -f "${dir}index.ts" ] && [ ! -f "${dir}index.js" ]; then
              echo "Skipping $name (no index.ts / index.js)"
              continue
            fi
            echo "::group::Deploy $name"
            supabase functions deploy "$name" --use-api --project-ref "$REF"
            echo "::endgroup::"
          done
